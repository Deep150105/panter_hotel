<!DOCTYPE html>
<html>
<head>
    <title>Confirmation - Panter Hotel</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center mb-4">Confirmation Page</h1>
    <div class="card p-4 mx-auto" style="max-width: 600px;">
        <p><strong>Dear {{ name }}:</strong></p>
        <p>Thank you for choosing Panter Hotel. We are pleased to confirm your room reservation from <strong>{{ checkin }}</strong> to <strong>{{ checkout }}</strong>.</p>
        <p>We look forward to seeing you soon.</p>
        <div class="text-center mt-3">
            <a href="/" class="btn btn-primary">Back to Home</a>
        </div>
    </div>
</div>
</body>
</html>
