<!DOCTYPE html>
<html>
<head>
    <title>Reservation - Panter Hotel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center mb-4">Panter Hotel Room Reservation</h1>
    <form method="POST" action="/reservation">
        <div class="mb-3 row">
            <label class="col-sm-3 col-form-label fw-bold">Name:</label>
            <div class="col-sm-6">
                <input type="text" name="name" class="form-control" required>
            </div>
        </div>
        <div class="mb-3 row">
            <label class="col-sm-3 col-form-label fw-bold">Check-in date:</label>
            <div class="col-sm-6">
                <input type="date" name="checkin" class="form-control" required>
            </div>
        </div>
        <div class="mb-3 row">
            <label class="col-sm-3 col-form-label fw-bold">Check-out date:</label>
            <div class="col-sm-6">
                <input type="date" name="checkout" class="form-control" required>
            </div>
        </div>
        <div class="mb-3 row">
            <label class="col-sm-3 col-form-label fw-bold">Room type:</label>
            <div class="col-sm-6">
                <select name="room_type" class="form-control" required>
                    <option value="Single">Single</option>
                    <option value="Double">Double</option>
                    <option value="Suite">Suite</option>
                </select>
            </div>
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary btn-lg">Submit</button>
        </div>
    </form>
</div>
</body>
</html>
